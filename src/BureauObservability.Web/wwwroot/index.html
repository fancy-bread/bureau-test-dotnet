<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bureau Observability Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: monospace; background: #0d1117; color: #c9d1d9; display: flex; flex-direction: column; height: 100vh; }
    header { padding: 12px 16px; background: #161b22; border-bottom: 1px solid #30363d; display: flex; align-items: center; gap: 16px; }
    header h1 { font-size: 1rem; color: #f0f6fc; }
    #status-indicator { font-size: 0.8rem; padding: 3px 8px; border-radius: 4px; background: #21262d; }
    #status-indicator.connected { background: #1a4731; color: #3fb950; }
    #status-indicator.disconnected { background: #3d2205; color: #d29922; }
    #status-indicator.error { background: #4d1212; color: #f85149; }
    #status-indicator.unknown { background: #21262d; color: #8b949e; }
    main { display: flex; flex: 1; overflow: hidden; }
    #feed { flex: 1; overflow-y: auto; padding: 8px; }
    .event-row { padding: 8px 10px; margin: 2px 0; background: #161b22; border: 1px solid #30363d; border-radius: 4px; cursor: pointer; }
    .event-row:hover { border-color: #58a6ff; }
    .event-row.selected { border-color: #58a6ff; background: #1c2b3a; }
    .event-row.parse-error { border-color: #f85149; }
    .event-time { font-size: 0.75rem; color: #8b949e; }
    .event-type { font-size: 0.85rem; color: #79c0ff; margin: 2px 0; }
    .event-source { font-size: 0.75rem; color: #8b949e; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #detail { width: 420px; border-left: 1px solid #30363d; padding: 12px; overflow-y: auto; background: #161b22; display: none; }
    #detail.visible { display: block; }
    #detail h2 { font-size: 0.9rem; color: #f0f6fc; margin-bottom: 10px; }
    .detail-field { margin: 6px 0; }
    .detail-label { font-size: 0.7rem; color: #8b949e; text-transform: uppercase; letter-spacing: 0.05em; }
    .detail-value { font-size: 0.8rem; color: #c9d1d9; word-break: break-all; }
    #detail pre { background: #0d1117; padding: 8px; border-radius: 4px; font-size: 0.75rem; overflow-x: auto; white-space: pre-wrap; word-break: break-all; }
    #empty-state { color: #8b949e; text-align: center; padding: 40px 16px; }
  </style>
</head>
<body>
  <header>
    <h1>Bureau Observability Dashboard</h1>
    <span id="status-indicator" class="unknown">⬤ Unknown</span>
  </header>
  <main>
    <div id="feed">
      <div id="empty-state">No events yet. Waiting for messages on bureau.runs…</div>
    </div>
    <div id="detail">
      <h2>Event Detail</h2>
      <div id="detail-content"></div>
    </div>
  </main>

  <script>
    const feed = document.getElementById('feed');
    const emptyState = document.getElementById('empty-state');
    const detail = document.getElementById('detail');
    const detailContent = document.getElementById('detail-content');
    const statusIndicator = document.getElementById('status-indicator');
    let selectedId = null;

    function setStatus(state) {
      const s = (state.status || 'Unknown').toLowerCase();
      statusIndicator.className = s;
      const labels = { connected: 'Connected', disconnected: 'Disconnected', error: 'Error', unknown: 'Unknown' };
      statusIndicator.textContent = '⬤ ' + (labels[s] || state.status);
    }

    function formatTime(iso) {
      try { return new Date(iso).toISOString().replace('T', ' ').substring(0, 23) + 'Z'; }
      catch { return iso; }
    }

    function formatJson(str) {
      try { return JSON.stringify(JSON.parse(str), null, 2); }
      catch { return str; }
    }

    function renderDetail(evt) {
      detailContent.innerHTML = `
        <div class="detail-field"><div class="detail-label">ID</div><div class="detail-value">${esc(evt.id)}</div></div>
        <div class="detail-field"><div class="detail-label">CloudEvent ID</div><div class="detail-value">${esc(evt.cloudEventId)}</div></div>
        <div class="detail-field"><div class="detail-label">Source</div><div class="detail-value">${esc(evt.source)}</div></div>
        <div class="detail-field"><div class="detail-label">Type</div><div class="detail-value">${esc(evt.type)}</div></div>
        <div class="detail-field"><div class="detail-label">Time</div><div class="detail-value">${esc(formatTime(evt.time))}</div></div>
        <div class="detail-field"><div class="detail-label">Data Content Type</div><div class="detail-value">${esc(evt.dataContentType)}</div></div>
        <div class="detail-field"><div class="detail-label">Partition / Offset</div><div class="detail-value">${evt.partition} / ${evt.offset}</div></div>
        <div class="detail-field"><div class="detail-label">Parse Error</div><div class="detail-value">${evt.isParseError ? 'Yes' : 'No'}</div></div>
        <div class="detail-field"><div class="detail-label">Payload</div><pre>${esc(formatJson(evt.data))}</pre></div>
      `;
      detail.classList.add('visible');
    }

    function esc(str) {
      return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function addEventRow(evt, prepend) {
      emptyState.style.display = 'none';
      const row = document.createElement('div');
      row.className = 'event-row' + (evt.isParseError ? ' parse-error' : '');
      row.dataset.id = evt.id;
      row.innerHTML = `
        <div class="event-time">${esc(formatTime(evt.time))}</div>
        <div class="event-type">${esc(evt.type)}</div>
        <div class="event-source">${esc(evt.source || '(parse error)')}</div>
      `;
      row.addEventListener('click', () => {
        document.querySelectorAll('.event-row.selected').forEach(r => r.classList.remove('selected'));
        row.classList.add('selected');
        selectedId = evt.id;
        renderDetail(evt);
      });
      if (prepend) {
        feed.insertBefore(row, feed.firstChild === emptyState ? null : feed.firstChild);
      } else {
        feed.appendChild(row);
      }
    }

    // Load initial events
    fetch('/api/events').then(r => r.json()).then(data => {
      (data.events || []).forEach(evt => addEventRow(evt, false));
    }).catch(() => {});

    // SSE stream
    const es = new EventSource('/api/events/stream');

    es.addEventListener('bureau-event', e => {
      const evt = JSON.parse(e.data);
      addEventRow(evt, true);
    });

    es.addEventListener('connection-state', e => {
      setStatus(JSON.parse(e.data));
    });

    es.onerror = () => {
      setStatus({ status: 'Disconnected' });
    };
  </script>
</body>
</html>
