[runtime]
language    = "dotnet"
base_image  = "mcr.microsoft.com/dotnet/sdk:10"
install_cmd = "make restore"
lint_cmd    = "make lint"
build_cmd   = "make build"
test_cmd    = "make test"

[ralph_loop]
max_builder_attempts = 3
max_rounds           = 3
command_timeout      = 300

[bureau]
builder_model   = "claude-sonnet-4-6"
reviewer_model  = "claude-opus-4-7"
